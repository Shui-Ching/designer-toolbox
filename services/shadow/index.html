<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../../images/default/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 內容安全政策（CSP）：白名單可載入來源，降低 XSS／供應鏈風險 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cloud.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://cloud.umami.is https://gateway.umami.is; base-uri 'self'; form-action 'self'">

  <title>陰影產生器 · 設計師工具箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Hanken+Grotesk:wght@300..700&family=Noto+Serif+TC:wght@300..700&family=Noto+Sans+TC:wght@300..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles/shared.css?v=202607041135">
  <link rel="stylesheet" href="./style.css?v=202607041135">

  <!-- Umami 匿名分析（cookieless），網站 ID 已設定（shui-ching） -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="b3d6a837-7848-4e38-9d09-315d62f9103a"></script>
</head>
<body data-tool="shadow">
  <main class="container">
    <div class="tool-head">
      <div>
        <span class="tag tag-accent">Tool / 14</span>
        <h1 class="tool-head-title">陰影產生器</h1>
      </div>
      <div class="tool-head-actions">
        <button type="button" class="back-link share-btn" data-share>↗ 分享工具</button>
        <a class="back-link" href="../../index.html">← 回工具箱</a>
      </div>
    </div>

    <p class="tool-intro">
      視覺化堆疊多層 <span class="tag">box-shadow</span>，逐層調整位移、模糊、擴散、顏色與
      不透明度，棋盤舞台即時預覽，一鍵複製可直接貼用的 CSS。全程在瀏覽器端運算。
    </p>

    <div class="shadow-layout">

      <!-- 左：控制台 -->
      <section class="controls" aria-label="陰影控制">

        <!-- 預設樣式 -->
        <div class="control-block">
          <span class="control-label">預設樣式 · presets</span>
          <div class="chip-group" id="preset-group">
            <button class="chip" type="button" data-preset="soft">柔和</button>
            <button class="chip" type="button" data-preset="hard">手冊硬陰影</button>
            <button class="chip" type="button" data-preset="layered">層疊立體</button>
            <button class="chip" type="button" data-preset="glow">外發光</button>
            <button class="chip" type="button" data-preset="inset">內凹</button>
          </div>
        </div>

        <!-- 圖層清單 -->
        <div class="control-block">
          <div class="layers-head">
            <span class="control-label">陰影圖層 · layers</span>
            <button class="btn" type="button" id="add-layer">＋ 新增圖層</button>
          </div>
          <ul class="layer-list" id="layer-list"><!-- JS 注入圖層列 --></ul>
        </div>

        <!-- 選取圖層的編輯區 -->
        <div class="control-block layer-editor" id="layer-editor">

          <label class="toggle-row">
            <input type="checkbox" id="layer-inset">
            <span>內陰影（inset）</span>
          </label>

          <div class="control-block">
            <span class="control-label">水平位移 X
              <span class="control-label-value"><span id="val-x">0</span>px</span>
            </span>
            <input class="range-input" type="range" id="layer-x" min="-100" max="100" value="0">
          </div>

          <div class="control-block">
            <span class="control-label">垂直位移 Y
              <span class="control-label-value"><span id="val-y">8</span>px</span>
            </span>
            <input class="range-input" type="range" id="layer-y" min="-100" max="100" value="8">
          </div>

          <div class="control-block">
            <span class="control-label">模糊 blur
              <span class="control-label-value"><span id="val-blur">24</span>px</span>
            </span>
            <input class="range-input" type="range" id="layer-blur" min="0" max="150" value="24">
          </div>

          <div class="control-block">
            <span class="control-label">擴散 spread
              <span class="control-label-value"><span id="val-spread">0</span>px</span>
            </span>
            <input class="range-input" type="range" id="layer-spread" min="-100" max="100" value="0">
          </div>

          <div class="control-block">
            <span class="control-label">不透明度 opacity
              <span class="control-label-value"><span id="val-opacity">25</span>%</span>
            </span>
            <input class="range-input" type="range" id="layer-opacity" min="0" max="100" value="25">
          </div>

          <div class="control-block">
            <span class="control-label">陰影顏色 · color</span>
            <div class="color-row">
              <input type="color" id="layer-color" class="color-swatch" value="#1c1b18">
              <input type="text" id="layer-color-hex" class="text-input color-hex" value="#1C1B18" spellcheck="false" maxlength="7">
            </div>
          </div>
        </div>

        <!-- 預覽外觀微調 -->
        <div class="control-block control-section">
          <span class="control-label">預覽外觀 · preview</span>
          <div class="preview-grid">
            <label class="mini-field">
              <span>方塊色</span>
              <input type="color" id="box-color" class="color-swatch" value="#f4f1e8">
            </label>
            <label class="mini-field">
              <span>圓角 <span class="control-label-value"><span id="val-radius">12</span>px</span></span>
              <input class="range-input" type="range" id="box-radius" min="0" max="120" value="12">
            </label>
          </div>
          <div class="chip-group" id="stage-group">
            <span class="control-label stage-label">舞台底色</span>
            <button class="chip is-active" type="button" data-stage="light">淺色</button>
            <button class="chip" type="button" data-stage="dark">深色</button>
            <button class="chip" type="button" data-stage="check">棋盤</button>
          </div>
        </div>

      </section>

      <!-- 右：預覽 + 輸出 -->
      <section class="output" aria-label="預覽與輸出">

        <div class="stage-bar">
          <span class="tag">Preview</span>
          <span class="stage-hint" id="stage-hint">拖曳滑桿即時更新</span>
        </div>
        <div class="shadow-stage is-light" id="shadow-stage">
          <div class="shadow-box" id="shadow-box"></div>
        </div>

        <div class="section-rule"><span class="tag">CSS</span></div>
        <div class="code-wrap">
          <pre class="code-block" id="code-out">box-shadow: ;</pre>
          <button class="btn btn-accent code-copy" type="button" id="copy-btn">複製 CSS</button>
        </div>
        <p class="copy-hint" id="copy-hint" aria-live="polite"></p>

      </section>

    </div>
  </main>

  <!-- 頁尾 -->
  <footer class="container site-foot"></footer>

  <script type="module" src="./script.js?v=202607041135"></script>
</body>
</html>
