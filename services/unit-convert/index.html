<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../../images/default/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 內容安全政策（CSP）：白名單可載入來源，降低 XSS／供應鏈風險 -->

  <title>單位換算 · 設計師工具箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles/shared.css?v=202606121651">
  <link rel="stylesheet" href="./style.css?v=202606121651">

  <!-- Umami 匿名分析（cookieless），網站 ID 已設定（shui-ching） -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="b3d6a837-7848-4e38-9d09-315d62f9103a"></script>
</head>
<body data-tool="unit-convert">
  <main class="container">
    <div class="tool-head">
      <div>
        <span class="tag tag-accent">Tool / 24</span>
        <h1 class="tool-head-title">單位換算</h1>
      </div>
      <div class="tool-head-actions">
        <button type="button" class="back-link share-btn" data-share>↗ 分享工具</button>
        <a class="back-link" href="../../index.html">← 回工具箱</a>
      </div>
    </div>

    <p class="tool-intro">
      網頁字級（<span class="tag">px</span><span class="tag">rem</span><span class="tag">em</span><span class="tag">pt</span><span class="tag">%</span>）、
      印刷物理（<span class="tag">mm</span><span class="tag">cm</span><span class="tag">in</span><span class="tag">pt</span><span class="tag">px</span>）、
      以及長度／重量／溫度／面積即時雙向互轉。改任一欄其餘自動跟著換算，全程在瀏覽器端運算、不上傳任何資料。
    </p>

    <section class="converter" aria-label="單位換算">

      <!-- 換算類別分頁 -->
      <div class="unit-tabs" id="unit-tabs" role="tablist" aria-label="換算類別">
        <button class="unit-tab is-active" type="button" role="tab" data-cat="css" aria-selected="true">網頁字級</button>
        <button class="unit-tab" type="button" role="tab" data-cat="print" aria-selected="false">印刷／物理</button>
        <button class="unit-tab" type="button" role="tab" data-cat="length" aria-selected="false">長度</button>
        <button class="unit-tab" type="button" role="tab" data-cat="weight" aria-selected="false">重量</button>
        <button class="unit-tab" type="button" role="tab" data-cat="temp" aria-selected="false">溫度</button>
        <button class="unit-tab" type="button" role="tab" data-cat="area" aria-selected="false">面積</button>
      </div>

      <!-- 設定列（依類別動態顯示，例如根字級、DPI） -->
      <div class="settings" id="settings"></div>

      <div class="section-rule"><span class="tag" id="cat-tag">單位互轉</span></div>

      <!-- 單位欄位列表（依類別動態產生） -->
      <div class="unit-list" id="unit-list"></div>

      <p class="copy-hint" id="copy-hint" aria-live="polite"></p>
      <p class="unit-note" id="unit-note"></p>

    </section>
  </main>

  <!-- 頁尾 -->
  <footer class="container site-foot">
    <a href="https://forms.gle/VAFZCfakxrVvpTdq6" target="_blank" rel="noopener noreferrer" class="btn btn-accent">意見回饋</a>
    <span class="site-foot-copy">© 2026 Andrew Cheng. All rights reserved.</span>
  </footer>

  <script type="module" src="./script.js?v=202606121651"></script>
</body>
</html>
