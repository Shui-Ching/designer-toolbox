<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../../images/default/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 內容安全政策（CSP）：白名單可載入來源，降低 XSS／供應鏈風險 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cloud.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://cloud.umami.is https://gateway.umami.is; base-uri 'self'; form-action 'self'">

  <title>Regex 測試器 · 設計師工具箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles/shared.css?v=202607172223">
  <link rel="stylesheet" href="./style.css?v=202607172223">

  <!-- Umami 匿名分析（cookieless），網站 ID 已設定（shui-ching） -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="b3d6a837-7848-4e38-9d09-315d62f9103a"></script>
</head>
<body data-tool="regex-tester">
  <main class="container">
    <div class="tool-head">
      <div>
        <span class="tag tag-accent">Tool / 41</span>
        <h1 class="tool-head-title">Regex 測試器</h1>
      </div>
      <div class="tool-head-actions">
        <button type="button" class="back-link share-btn" data-share>↗ 分享工具</button>
        <a class="back-link" href="../../index.html">← 回工具箱</a>
      </div>
    </div>

    <p class="tool-intro">
      輸入正規表達式與旗標，貼上測試文字即時高亮所有匹配並列出擷取群組。原生 <code>RegExp</code>，零相依，全程在瀏覽器端運算，文字不上傳。
    </p>

    <!-- 正規表達式與旗標 -->
    <div class="regex-input-row">
      <span class="regex-delim" aria-hidden="true">/</span>
      <input
        type="text"
        id="pattern-input"
        class="regex-pattern-input"
        placeholder="輸入正規表達式，例如 \d{3}-\d{4}"
        spellcheck="false"
        autocomplete="off"
        aria-label="正規表達式">
      <span class="regex-delim" aria-hidden="true">/</span>
      <div class="regex-flags" id="flags-group" role="group" aria-label="Flags">
        <button class="filter-chip is-active" type="button" data-flag="g" title="全域：找出所有匹配，而非只有第一個">g</button>
        <button class="filter-chip" type="button" data-flag="i" title="忽略大小寫">i</button>
        <button class="filter-chip" type="button" data-flag="m" title="多行：^ $ 比對每一行的開頭結尾">m</button>
        <button class="filter-chip" type="button" data-flag="s" title="單行：. 可以匹配換行符">s</button>
      </div>
    </div>
    <p class="pattern-status" id="pattern-status" aria-live="polite"></p>

    <!-- 常用 pattern 速查 -->
    <div class="section-rule"><span class="tag">常用 Pattern 速查</span></div>
    <div class="quick-pattern-bar" id="quick-pattern-bar"></div>

    <!-- 測試文字 -->
    <div class="section-rule"><span class="tag">測試文字</span></div>
    <div class="editor-toolbar">
      <span class="editor-toolbar-label" id="live-count">0 字元</span>
      <div class="editor-toolbar-actions">
        <button class="btn" id="sample-btn" type="button">載入範例</button>
        <button class="btn" id="clear-btn" type="button">清空</button>
      </div>
    </div>
    <textarea
      id="test-input"
      class="text-area"
      placeholder="貼上要測試的文字…"
      spellcheck="false"
      aria-label="測試文字"></textarea>

    <!-- 比對結果 -->
    <div class="section-rule"><span class="tag">比對結果</span></div>
    <div class="regex-result-head">
      <p class="regex-stat" id="match-stat" hidden aria-live="polite"></p>
      <button class="btn" id="copy-matches-btn" type="button">複製所有匹配</button>
    </div>
    <div class="regex-highlight" id="regex-highlight" aria-live="polite"></div>
    <p class="copy-hint" id="copy-hint" aria-live="polite"></p>

    <!-- 擷取群組 -->
    <div class="section-rule"><span class="tag">擷取群組</span></div>
    <div class="match-list" id="match-list"></div>

  </main>

  <!-- 頁尾 -->
  <footer class="container site-foot"></footer>

  <script type="module" src="./script.js?v=202607172223"></script>
</body>
</html>
