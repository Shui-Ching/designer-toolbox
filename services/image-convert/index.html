<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../../images/default/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 內容安全政策（CSP）：白名單可載入來源，降低 XSS／供應鏈風險 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cloud.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://cloud.umami.is https://gateway.umami.is; base-uri 'self'; form-action 'self'">

  <title>圖片格式轉換 · 設計師工具箱</title>
  <meta name="description" content="瀏覽器端圖片格式互轉：PNG / JPEG / WebP / AVIF 任意對轉，可調品質，批次處理，前後大小即時對比，檔案不上傳。">

  <!-- 字體：Inter（英文／數字）/ Noto Sans TC（中文），全站統一 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../shared/styles/shared.css?v=202607101704">
  <link rel="stylesheet" href="./style.css?v=202607101704">

  <!-- Umami 匿名分析（cookieless），網站 ID 已設定（shui-ching） -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="b3d6a837-7848-4e38-9d09-315d62f9103a"></script>
</head>
<body data-tool="image-convert">
  <main class="container">
    <div class="tool-head">
      <div>
        <span class="tag tag-accent">Tool / 16</span>
        <h1 class="tool-head-title">圖片格式轉換</h1>
      </div>
      <div class="tool-head-actions">
        <button type="button" class="back-link share-btn" data-share>↗ 分享工具</button>
        <a class="back-link" href="../../index.html">← 回工具箱</a>
      </div>
    </div>

    <p class="tool-intro">
      在瀏覽器端把圖片重新編碼成另一種格式：PNG / JPEG / WebP / AVIF 任意對轉，
      可調品質，批次處理，前後大小即時對比。<strong>檔案不會離開你的電腦。</strong>
    </p>

    <!-- 轉換設定 -->
    <section class="controls">
      <!-- 目標格式 -->
      <div class="control-row">
        <span class="control-label">目標格式</span>
        <div class="format-group" id="format-group">
          <button type="button" class="format-chip" data-format="image/png">PNG <span class="format-note">無損</span></button>
          <button type="button" class="format-chip is-active" data-format="image/jpeg">JPEG</button>
          <button type="button" class="format-chip" data-format="image/webp">WebP</button>
          <button type="button" class="format-chip" data-format="image/avif">AVIF</button>
        </div>
      </div>

      <!-- 品質 -->
      <div class="control-row" id="quality-row">
        <span class="control-label">品質 <output class="quality-value" id="quality-value">80%</output></span>
        <input type="range" class="quality-slider" id="quality" min="10" max="100" step="5" value="80">
      </div>
    </section>

    <!-- 拖放區 -->
    <div class="dropzone" id="dropzone">
      <p class="dropzone-hint">把圖片拖進來，或點擊選檔</p>
      <p class="tag">支援 JPG / PNG / WebP / GIF / AVIF · 可一次多張</p>
      <input type="file" id="file-input" accept="image/*" multiple hidden>
    </div>

    <!-- 結果 -->
    <section class="results" id="results" hidden>
      <div class="section-rule">
        <span class="tag">轉換結果</span>
      </div>

      <div class="results-bar">
        <p class="results-summary" id="results-summary"></p>
        <div class="results-actions">
          <button type="button" class="btn" id="clear-all">清空</button>
          <button type="button" class="btn btn-accent" id="download-all">全部下載</button>
        </div>
      </div>

      <ul class="result-list" id="result-list"></ul>
    </section>
  </main>

  <!-- 頁尾 -->
  <footer class="container site-foot"></footer>

  <script type="module" src="./script.js?v=202607101704"></script>
</body>
</html>
