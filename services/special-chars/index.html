<body data-tool="special-chars">
  <main class="container">
    <div class="tool-head">
      <div>
        <span class="tag tag-accent">Tool / 37</span>
        <h1 class="tool-head-title">特殊符號複製器</h1>
      </div>
      <div class="tool-head-actions">
        <button type="button" class="back-link share-btn" data-share>↗ 分享工具</button>
        <a class="back-link" href="../../index.html">← 回工具箱</a>
      </div>
    </div>

    <p class="tool-intro">
      收錄標點、箭頭、數學、貨幣、勾選、圈碼數字等常用特殊符號，
      點任一卡片即可複製該符號，方便貼到 Word、Excel 或任何純文字欄位。
    </p>

    <!-- 搜尋 + 分類篩選 -->
    <div class="query-bar">
      <input type="search" id="search" class="search-input" placeholder="搜尋符號名稱或關鍵字，例如「箭頭」「勾選」「arrow」…" autocomplete="off">
      <div class="filter-bar" id="filter-bar"></div>
    </div>

    <p class="result-count" id="result-count"></p>

    <!-- 符號列表（依分類分區，由 JS 渲染） -->
    <div id="symbol-list"></div>
  </main>

  <!-- 頁尾 -->
  <footer class="container site-foot"></footer>
