<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../../images/default/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 內容安全政策（CSP）：白名單可載入來源，降低 XSS／供應鏈風險 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cloud.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://cloud.umami.is https://gateway.umami.is; base-uri 'self'; form-action 'self'">

  <title>盤古之白 · 設計師工具箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles/shared.css?v=202606262323">
  <link rel="stylesheet" href="./style.css?v=202606262323">

  <!-- Umami 匿名分析（cookieless），網站 ID 已設定（shui-ching） -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="b3d6a837-7848-4e38-9d09-315d62f9103a"></script>
</head>
<body data-tool="pangu">
  <main class="container">
    <div class="tool-head">
      <div>
        <span class="tag tag-accent">Tool / 26</span>
        <h1 class="tool-head-title">盤古之白</h1>
      </div>
      <div class="tool-head-actions">
        <button type="button" class="back-link share-btn" data-share>↗ 分享工具</button>
        <a class="back-link" href="../../index.html">← 回工具箱</a>
      </div>
    </div>

    <p class="tool-intro">
      自動在中文字符與英文字母、數字之間插入半角空格，讓中英混排更舒適易讀；也支援移除這些空格。純
      <span class="tag">Regex</span> 實作，全程在瀏覽器端處理，文字不上傳。
    </p>

    <div class="pangu-layout">

      <!-- 左：輸入區 -->
      <section class="editor-pane" aria-label="文字輸入">
        <div class="editor-toolbar">
          <span class="editor-toolbar-label" id="live-count">0 字元</span>
          <div class="editor-toolbar-actions">
            <button class="btn" id="sample-btn" type="button">載入範例</button>
            <button class="btn" id="copy-btn" type="button">複製文字</button>
            <button class="btn" id="clear-btn" type="button">清空</button>
          </div>
        </div>
        <textarea
          id="text-input"
          class="text-area"
          placeholder="在這裡貼上中英混排文字…例如：我用iPhone拍了100張照片"
          spellcheck="false"
          aria-label="文字輸入區"></textarea>
        <p class="copy-hint" id="copy-hint" aria-live="polite"></p>
      </section>

      <!-- 右：操作面板 -->
      <aside class="pangu-pane" aria-label="盤古之白操作">
        <div class="section-rule"><span class="tag">操作</span></div>

        <div class="pangu-actions">
          <!-- 加入空格 -->
          <button class="pangu-btn" type="button" id="add-btn" aria-label="加入盤古空格">
            <span class="pangu-btn-demo" aria-hidden="true">
              <span class="demo-cjk">中</span><span class="demo-gap"></span><span class="demo-latin">A</span>
            </span>
            <span class="pangu-btn-label">加入空格</span>
            <span class="pangu-btn-sub">Add Spacing</span>
          </button>

          <!-- 移除空格 -->
          <button class="pangu-btn is-remove" type="button" id="remove-btn" aria-label="移除盤古空格">
            <span class="pangu-btn-demo" aria-hidden="true">
              <span class="demo-cjk">中</span><span class="demo-latin">A</span>
            </span>
            <span class="pangu-btn-label">移除空格</span>
            <span class="pangu-btn-sub">Remove Spacing</span>
          </button>
        </div>

        <!-- 執行結果統計 -->
        <p class="pangu-stat" id="pangu-stat" hidden aria-live="polite"></p>

        <div class="section-rule"><span class="tag">說明</span></div>
        <div class="pangu-note">
          <p>「盤古之白」依排版慣例，在以下位置插入半角空格：</p>
          <ul>
            <li>中文字符 ↔ 英文字母</li>
            <li>中文字符 ↔ 阿拉伯數字</li>
          </ul>
          <p class="pangu-note-hint">移除操作僅針對上述位置的空格，無法區分是否由本工具插入。</p>
        </div>
      </aside>

    </div>
  </main>

  <!-- 頁尾 -->
  <footer class="container site-foot"></footer>


  <script type="module" src="./script.js?v=202606262323"></script>
</body>
</html>
