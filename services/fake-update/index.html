<body data-tool="fake-update">
  <main class="container">
    <div class="tool-head">
      <div>
        <span class="tag tag-accent">Tool / 18</span>
        <h1 class="tool-head-title">偷懶神器</h1>
      </div>
      <div class="tool-head-actions">
        <button type="button" class="back-link share-btn" data-share>↗ 分享工具</button>
        <a class="back-link" href="../../index.html">← 回工具箱</a>
      </div>
    </div>

    <p class="tool-intro">
      全螢幕假更新畫面，Mac / Windows 雙款。<br>
      <strong>讓主管以為你在等系統更新，偷懶不留痕跡。</strong>
    </p>

    <!-- OS 選擇 -->
    <div class="os-selector" role="group" aria-label="選擇作業系統">

      <button class="os-card is-selected" type="button" data-os="mac" aria-pressed="true">
        <svg class="os-card-icon" viewBox="0 0 814 1000" fill="currentColor" aria-hidden="true">
          <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105-37.5-155.5-127.4C46 790.9 0 663.1 0 541.8c0-207.4 135.4-316.8 268.7-316.8 70.1 0 128.4 46.4 172.5 46.4 42.8 0 109.2-49 191.5-49 30.8 0 133.9 2.6 198.2 100.3zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
        </svg>
        <span class="os-card-name">macOS</span>
        <span class="os-card-desc">Sequoia 系統更新</span>
      </button>

      <button class="os-card" type="button" data-os="win" aria-pressed="false">
        <svg class="os-card-icon os-card-icon-win" viewBox="0 0 100 100" fill="none" aria-hidden="true">
          <rect x="0"  y="0"  width="46" height="46" fill="#f25022" rx="2"/>
          <rect x="54" y="0"  width="46" height="46" fill="#7fba00" rx="2"/>
          <rect x="0"  y="54" width="46" height="46" fill="#00a4ef" rx="2"/>
          <rect x="54" y="54" width="46" height="46" fill="#ffb900" rx="2"/>
        </svg>
        <span class="os-card-name">Windows</span>
        <span class="os-card-desc">Windows 11 更新</span>
      </button>

    </div>

    <!-- 啟動區 -->
    <div class="launch-area">
      <button class="btn btn-accent launch-btn" type="button" id="launch-btn">
        啟動全螢幕
      </button>
      <p class="launch-hint">啟動後按 <kbd>ESC</kbd> 關閉假畫面</p>
    </div>

  </main>

  <!-- 頁尾 -->
  <footer class="container site-foot"></footer>

  <script type="module" src="./script.js?v=202607181201"></script>
</body>
</html>
